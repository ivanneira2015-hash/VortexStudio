services:
  - type: web
    name: vortex-backend
    runtime: node
    rootDir: vortex-backend
    buildCommand: npm install && npm run build && npm run init-db
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        value: https://vortex-studio-flame.vercel.app
      - key: JWT_SECRET
        generateValue: true
      - key: GROQ_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: vortex-db
          property: connectionString

databases:
  - name: vortex-db
    databaseName: vortex
    user: vortex
    plan: free
